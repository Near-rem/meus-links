<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Contatos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --border: rgba(255,255,255,0.12); --blue: #007AFF; }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Background e Efeitos ── */
        #canvas-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .grid-overlay {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(0,122,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,122,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .scanlines {
            position: fixed; inset: 0; pointer-events: none; z-index: 100;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
        }

        #scene {
            position: relative; z-index: 2;
            display: flex; flex-direction: column;
            align-items: center; padding: 40px 20px;
            transform-style: preserve-3d;
            will-change: transform;
            width: 100%;
        }

        #scene.no-3d { transform: none !important; transform-style: flat !important; }

        /* ── Avatar ── */
        .photo-wrap { position: relative; margin-bottom: 20px; transform: translateZ(60px); }
        .photo-container {
            width: 110px; height: 110px; border-radius: 50%;
            border: 2px solid var(--blue);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 122, 255, 0.3);
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 {
            font-size: 20px; color: var(--blue);
            letter-spacing: 4px; text-transform: uppercase;
            transform: translateZ(40px);
            text-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
        }

        .bio {
            font-family: 'Share Tech Mono', monospace;
            color: #00FF00; font-size: 13px;
            margin: 10px 0 30px 0;
            transform: translateZ(30px);
        }

        /* ── Botões com Efeito de Luz (Glow Trace) ── */
        .button-container {
            width: 100%; max-width: 350px;
            display: flex; flex-direction: column; gap: 12px;
            transform: translateZ(80px);
        }

        .btn {
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: #fff;
            text-decoration: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 12px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            transition: border-color 0.3s, transform 0.3s;
            cursor: pointer;
        }

        /* O rastro de cor que segue o mouse */
        .btn-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle 100px at var(--x) var(--y), var(--glow-color), transparent);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .btn:hover { border-color: rgba(255,255,255,0.3); transform: scale(1.02) translateZ(10px); }
        .btn:hover .btn-glow { opacity: 0.35; }

        .btn i { margin-right: 12px; font-size: 18px; position: relative; z-index: 2; }
        .btn span { position: relative; z-index: 2; }

        /* Variáveis de cor para cada botão */
        .btn-discord { --glow-color: #5865F2; }
        .btn-whatsapp { --glow-color: #25D366; }
        .btn-instagram { --glow-color: #E1306C; }
        .btn-linkedin { --glow-color: #0077b5; }
        .btn-steam { --glow-color: #66c0f4; }
        .btn-xbox { --glow-color: #107C10; }
        .btn-of { --glow-color: #ff0000; }

        .btn-back { color: #666; text-decoration: none; margin-top: 25px; font-size: 12px; transition: 0.3s; transform: translateZ(20px); }
        .btn-back:hover { color: #fff; letter-spacing: 2px; }

        /* Pop-up */
        #popup-of {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #0a0a0a; border: 1px solid #ff0000;
            padding: 30px; z-index: 1001; text-align: center; border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.4); width: 280px;
        }
        #popup-of h2 { color: #ff0000; font-size: 18px; margin-bottom: 10px; }
        #popup-of p { font-size: 12px; margin-bottom: 20px; line-height: 1.5; color: #ccc; }
        #popup-of button { background: #ff0000; border: none; color: #fff; padding: 10px 20px; border-radius: 5px; font-family: 'Orbitron'; cursor: pointer; font-size: 10px; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="grid-overlay"></div>
    <div class="scanlines"></div>
    <div id="overlay"></div>

    <div id="popup-of">
        <h2>OPA! 🤨</h2>
        <p>TÁ INTERESSADO POR QUÊ?<br>QUER ME VER PELADO?</p>
        <button onclick="fecharPopup()">voltar</button>
    </div>

    <div id="scene">
        <div class="photo-wrap">
            <div class="photo-container">
                <img src="https://64.media.tumblr.com/eccc7dbeb27adb09abd52f0390dae90b/f3416c2782181375-0d/s400x600/3c1c61f4b31528dcf5252bcbde46832113f73f32.gifv">
            </div>
        </div>

        <h1>Meus Contatos</h1>
        <div class="bio">ID_SESSION: <span id="glitch"></span></div>

        <div class="button-container">
            <a href="https://discord.com/users/688116774092144669" target="_blank" class="btn btn-discord"><div class="btn-glow"></div><i class="fa-brands fa-discord"></i> <span>Discord</span></a>
            <a href="https://wa.me/5521971839439" target="_blank" class="btn btn-whatsapp"><div class="btn-glow"></div><i class="fa-brands fa-whatsapp"></i> <span>WhatsApp</span></a>
            <a href="https://www.instagram.com/near_rem/" target="_blank" class="btn btn-instagram"><div class="btn-glow"></div><i class="fa-brands fa-instagram"></i> <span>Instagram</span></a>
            <a href="https://www.linkedin.com/in/paulo-renato-40b43a32a/" target="_blank" class="btn btn-linkedin"><div class="btn-glow"></div><i class="fa-brands fa-linkedin"></i> <span>LinkedIn</span></a>
            <a href="https://steamcommunity.com/id/near_rem" target="_blank" class="btn btn-steam"><div class="btn-glow"></div><i class="fa-brands fa-steam"></i> <span>Steam</span></a>
            <a href="https://www.xbox.com/pt-BR/play/user/yIluminado" target="_blank" class="btn btn-xbox"><div class="btn-glow"></div><i class="fa-brands fa-xbox"></i> <span>Xbox</span></a>
            <div class="btn btn-of" onclick="abrirPopup()"><div class="btn-glow"></div><i class="fa-solid fa-lock"></i> <span>OnlyFans</span></div>
            
            <a href="index.html" class="btn-back">← Voltar</a>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let W, H, dots = [];

        const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        if (isTouch) scene.classList.add('no-3d');

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Partículas
        function initDots() {
            dots = Array.from({ length: 50 }, () => ({
                x: Math.random() * W, y: Math.random() * H,
                vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
                r: Math.random() * 1.5
            }));
        }
        initDots();

        function draw() {
            ctx.clearRect(0,0,W,H);
            ctx.fillStyle = "rgba(0, 122, 255, 0.2)";
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
                d.x += d.vx; d.y += d.vy;
                if(d.x < 0 || d.x > W) d.vx *= -1;
                if(d.y < 0 || d.y > H) d.vy *= -1;
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Parallax 3D e Rastro de Luz (Glow Trace)
        let tX = 0, tY = 0, cX = 0, cY = 0;
        
        if (!isTouch) {
            document.addEventListener('mousemove', e => {
                tX = (e.clientX - W/2) / (W/2);
                tY = (e.clientY - H/2) / (H/2);

                // Lógica da luz interna dos botões
                document.querySelectorAll('.btn').forEach(btn => {
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    btn.style.setProperty('--x', `${x}px`);
                    btn.style.setProperty('--y', `${y}px`);
                });
            });

            function animate() {
                cX += (tX - cX) * 0.1;
                cY += (tY - cY) * 0.1;
                scene.style.transform = `rotateY(${cX * 12}deg) rotateX(${-cY * 12}deg)`;
                requestAnimationFrame(animate);
            }
            animate();
        }

        setInterval(() => {
            document.getElementById('glitch').innerText = Math.random().toString(16).slice(2, 10).toUpperCase();
        }, 1);

        function abrirPopup() { document.getElementById('popup-of').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function fecharPopup() { document.getElementById('popup-of').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
