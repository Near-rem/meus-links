<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda - Near Rem</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --accent: #00e5b0;
            --gold: #f5c842;
            --ink: #e8e2ff;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ff4f8b;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            user-select: none;
        }

        .hud {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            font-family: 'Space Mono', monospace;
            background: var(--card-bg);
            padding: 15px 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .stat span { color: var(--gold); font-weight: bold; font-size: 1.2em; }

        /* GRID DINÂMICA */
        .farm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 600px;
        }

        .plot {
            aspect-ratio: 1/1;
            background: #080808;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plot:hover { border-color: var(--accent); background: #0f0f0f; }
        .plot.growing { cursor: wait; opacity: 0.8; }
        .plot.ready { 
            border-color: var(--gold); 
            animation: pulse-ready 1.5s infinite;
        }
        @keyframes pulse-ready {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 15px rgba(245, 200, 66, 0.2); }
        }

        .plot-icon { font-size: 28px; }
        .plot-status { font-size: 9px; text-transform: uppercase; margin-top: 5px; color: #555; }

        /* SEÇÃO DE LOJA E INVENTÁRIO */
        .container-bottom {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .shop-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .item-card {
            background: #000;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .item-card.land { border-color: var(--a2); background: linear-gradient(to bottom, #0a0a0a, #000); }

        .buy-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 8px;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 11px;
        }
        .buy-btn:disabled { background: #222; color: #555; }
        .buy-btn.land-btn { background: var(--gold); }

        .inv-display {
            font-family: 'Space Mono';
            font-size: 12px;
            background: #080808;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
        }
    </style>
</head>
<body>

    <div class="hud">
        <div class="stat">🪙 Moedas: <span id="coin-display">0</span></div>
    </div>

    <div class="farm-grid" id="farm-grid"></div>

    <div class="container-bottom">
        <div class="inv-display">
            <span>🌾 Trigo: <b id="inv-trigo">0</b></span>
            <span>🥕 Cenoura: <b id="inv-cenoura">0</b></span>
            <span>☕ Café: <b id="inv-cafe">0</b></span>
        </div>

        <div class="shop-section">
            <h4 style="margin:0; text-align:center; font-family:'Space Mono'; color:var(--accent)">LOJA DE EXPANSÃO</h4>
            <div class="shop-grid">
                <div class="item-card land">
                    <div style="font-size: 20px;">🏗️</div>
                    <strong>Novo Lote</strong>
                    <div id="land-price-tag" style="color:var(--gold); font-size:13px;">🪙 50</div>
                    <button class="buy-btn land-btn" onclick="game.buyLand()">EXPANDIR</button>
                </div>
                <div class="item-card">
                    <div style="font-size: 20px;">🌾</div>
                    <strong>Trigo</strong>
                    <div style="color:var(--gold); font-size:12px;">Preço: 5</div>
                    <button class="buy-btn" onclick="game.buySeed('trigo')">COMPRAR</button>
                </div>
                <div class="item-card">
                    <div style="font-size: 20px;">🥕</div>
                    <strong>Cenoura</strong>
                    <div style="color:var(--gold); font-size:12px;">Preço: 15</div>
                    <button class="buy-btn" onclick="game.buySeed('cenoura')">COMPRAR</button>
                </div>
                <div class="item-card">
                    <div style="font-size: 20px;">☕</div>
                    <strong>Café</strong>
                    <div style="color:var(--gold); font-size:12px;">Preço: 40</div>
                    <button class="buy-btn" onclick="game.buySeed('cafe')">COMPRAR</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const game = (function() {
        let state = {
            coins: 30,
            seeds: { trigo: 2, cenoura: 0, cafe: 0 },
            plots: Array(3).fill(null).map(() => ({ status: 'empty', type: null }))
        };

        const items = {
            trigo:   { buy: 5,  sell: 12, time: 5000,  icon: '🌾', seedIcon: '🌱' },
            cenoura: { buy: 15, sell: 40, time: 12000, icon: '🥕', seedIcon: '🌿' },
            cafe:    { buy: 40, sell: 110, time: 30000, icon: '☕', seedIcon: '🌳' }
        };

        let landPrice = 50;

        function render() {
            document.getElementById('coin-display').innerText = state.coins;
            document.getElementById('inv-trigo').innerText = state.seeds.trigo;
            document.getElementById('inv-cenoura').innerText = state.seeds.cenoura;
            document.getElementById('inv-cafe').innerText = state.seeds.cafe;
            document.getElementById('land-price-tag').innerText = `🪙 ${landPrice}`;
            
            const grid = document.getElementById('farm-grid');
            grid.innerHTML = '';

            state.plots.forEach((plot, index) => {
                const div = document.createElement('div');
                div.className = `plot ${plot.status}`;
                div.onclick = () => handlePlotClick(index);

                let icon = '🟫';
                let label = 'Vazio';

                if (plot.status === 'growing') {
                    icon = items[plot.type].seedIcon;
                    label = 'Crescendo...';
                } else if (plot.status === 'ready') {
                    icon = items[plot.type].icon;
                    label = 'Colher!';
                }

                div.innerHTML = `<div class="plot-icon">${icon}</div><div class="plot-status">${label}</div>`;
                grid.appendChild(div);
            });
        }

        function handlePlotClick(index) {
            const plot = state.plots[index];

            if (plot.status === 'empty') {
                // Escolhe a melhor semente disponível automaticamente (prioridade café > cenoura > trigo)
                let selected = null;
                if (state.seeds.cafe > 0) selected = 'cafe';
                else if (state.seeds.cenoura > 0) selected = 'cenoura';
                else if (state.seeds.trigo > 0) selected = 'trigo';

                if (selected) {
                    state.seeds[selected]--;
                    plot.status = 'growing';
                    plot.type = selected;
                    render();
                    setTimeout(() => {
                        plot.status = 'ready';
                        render();
                    }, items[selected].time);
                }
            } else if (plot.status === 'ready') {
                state.coins += items[plot.type].sell;
                plot.status = 'empty';
                plot.type = null;
                render();
            }
        }

        return {
            buySeed: function(type) {
                if (state.coins >= items[type].buy) {
                    state.coins -= items[type].buy;
                    state.seeds[type]++;
                    render();
                }
            },
            buyLand: function() {
                if (state.coins >= landPrice) {
                    state.coins -= landPrice;
                    state.plots.push({ status: 'empty', type: null });
                    landPrice = Math.floor(landPrice * 1.8); // Preço sobe
                    render();
                }
            },
            init: () => render()
        };
    })();

    game.init();
</script>
</body>
</html>
