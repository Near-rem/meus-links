<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Arsenal</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px; 
            margin: 0; 
        }

        /* Foto com borda (estilo Index/Hacks) */
        .photo-container { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 2px solid #ff0000; 
            overflow: hidden; 
            margin-bottom: 20px; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); 
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 24px; color: #ff0000; margin: 0; letter-spacing: 3px; text-transform: uppercase; }
        .subtitle { color: #00FF00; font-family: monospace; font-size: 14px; margin: 10px 0 30px 0; }

        .button-container { width: 100%; max-width: 350px; }

        /* Botão identico ao do Index/Hacks */
        .btn { 
            background-color: #1A1A1A; 
            border: 1px solid #333; 
            color: #fff; 
            text-decoration: none; 
            display: block; 
            padding: 18px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            text-align: center; 
            font-weight: bold; 
            transition: 0.3s; 
            cursor: pointer; 
        }
        .btn:hover { 
            border-color: #ff0000; 
            background-color: #220000; 
            transform: scale(1.02); 
        }

        /* Pop-up (Estilo Acesso Negado) */
        #overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 999; 
        }
        #tool-popup { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background-color: #050505; 
            border: 2px solid #ff0000; 
            padding: 25px; 
            z-index: 1000; 
            text-align: center; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); 
            width: 85%; max-width: 300px; 
        }

        #popup-title { color: #ff0000; font-size: 18px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }
        
        /* Links dentro do Pop-up */
        .popup-link {
            display: block; 
            background: #111; 
            border: 1px solid #444; 
            color: #fff; 
            padding: 12px; 
            margin-bottom: 10px; 
            text-decoration: none; 
            border-radius: 8px;
            font-size: 14px; 
            transition: 0.2s;
            font-family: monospace;
        }
        .popup-link:hover { background: #ff0000; border-color: #fff; color: #fff; }
        
        .close-btn { margin-top: 15px; color: #888; font-size: 12px; cursor: pointer; display: inline-block; }

        .btn-back { color: #888; text-decoration: none; margin-top: 20px; font-size: 14px; }
        .btn-back:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="photo-container">
        <img src="https://i.makeagif.com/media/10-02-2016/A4wmZs.gif">
    </div>

    <h1>Arsenal</h1>
    <div class="subtitle">Módulos de ferramentas</div>

    <div class="button-container">
        <div class="btn" onclick="openTool('Localizar IP', [
            {n: 'IP-API', u: 'https://ip-api.com/'},
            {n: 'IPWhois', u: 'https://ipwho.is/'},
            {n: 'Iplogger', u: 'https://iplogger.org/'}
        ])">Localizar IP</div>

        <div class="btn" onclick="openTool('Scanners', [
            {n: 'VirusTotal', u: 'https://www.virustotal.com/'},
            {n: 'Hybrid Analysis', u: 'https://www.hybrid-analysis.com/'}
        ])">Scanners de Malware</div>

        <div class="btn" onclick="openTool('OSINT', [
            {n: 'HaveIBeenPwned', u: 'https://haveibeenpwned.com/'},
            {n: 'OSINT Framework', u: 'https://osintframework.com/'}
        ])">Vazamentos & OSINT</div>

        <a href="hacks.html" class="btn-back">← Voltar</a>
    </div>

    <div id="overlay" onclick="closeTool()"></div>
    <div id="tool-popup">
        <div id="popup-title">OPÇÕES</div>
        <div id="popup-links-container"></div>
        <span class="close-btn" onclick="closeTool()">[ FECHAR ]</span>
    </div>

    <script>
        function openTool(title, links) {
            const container = document.getElementById('popup-links-container');
            document.getElementById('popup-title').innerText = title;
            container.innerHTML = ''; 

            links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.u;
                a.target = '_blank';
                a.className = 'popup-link';
                a.innerText = link.n;
                container.appendChild(a);
            });

            document.getElementById('tool-popup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeTool() {
            document.getElementById('tool-popup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
