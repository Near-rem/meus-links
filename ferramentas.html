<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Arsenal</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px; 
            margin: 0; 
            min-height: 100vh;
        }

        .photo-container { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 2px solid #00f2ff; 
            overflow: hidden; 
            margin-bottom: 20px; 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); 
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 22px; color: #fff; margin: 0; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; }
        .subtitle { color: #00f2ff; font-family: monospace; font-size: 13px; margin: 10px 0 40px 0; letter-spacing: 1px; }

        .button-container { width: 100%; max-width: 350px; }

        .btn { 
            background-color: #0d0d0d; 
            border: 1px solid #222; 
            color: #ccc; 
            text-decoration: none; 
            display: block; 
            padding: 16px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            text-align: center; 
            font-weight: 500; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            letter-spacing: 1px;
        }
        .btn:hover { 
            border-color: #00f2ff; 
            color: #fff;
            background-color: #111; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1);
        }

        #overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(8px);
            z-index: 999; 
            animation: fadeIn 0.3s ease;
        }

        #tool-popup { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(15, 15, 15, 0.95); 
            border: 1px solid rgba(0, 242, 255, 0.5); 
            padding: 30px; 
            z-index: 1000; 
            text-align: center; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 242, 255, 0.1); 
            width: 85%; max-width: 320px; 
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #popup-title { 
            color: #fff; 
            font-size: 16px; 
            margin-bottom: 25px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }
        
        .popup-link {
            display: block; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 14px; 
            margin-bottom: 12px; 
            text-decoration: none; 
            border-radius: 10px;
            font-size: 14px; 
            transition: 0.3s;
            font-family: 'Courier New', monospace;
        }
        .popup-link:hover { 
            background: #00f2ff; 
            border-color: #fff; 
            color: #000; 
            font-weight: bold;
        }
        
        .close-btn { 
            margin-top: 20px; 
            color: #555; 
            font-size: 11px; 
            cursor: pointer; 
            display: inline-block; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .close-btn:hover { color: #ff4d4d; }

        .btn-back { color: #444; text-decoration: none; margin-top: 30px; font-size: 13px; transition: 0.3s; }
        .btn-back:hover { color: #00f2ff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, -40%); } to { opacity: 1; transform: translate(-50%, -50%); } }
    </style>
</head>
<body>

    <div class="photo-container">
        <img src="https://64.media.tumblr.com/5cab77a299d2902fb7dae22ffca6800d/f3416c2782181375-a5/s250x400/b6c03af6e062d404f86f4b8c388a9435b9452b37.gifv">
    </div>

    <h1>Arsenal</h1>
    <div class="subtitle">CORE_SYSTEM_INTERFACE</div>

    <div class="button-container">
        <div class="btn" onclick="openTool('Localizar IP', [
            {n: 'IP-API', u: 'https://ip-api.com/'},
            {n: 'IPWhois', u: 'https://ipwho.is/'},
            {n: 'Iplogger', u: 'https://iplogger.org/'}
        ])">Localizar IP</div>

        <div class="btn" onclick="openTool('E-mail Temporário', [
            {n: 'Temp Mail', u: 'https://temp-mail.org/pt/'},
            {n: 'Tempail', u: 'https://tempail.com/pt/'},
            {n: 'TempMailo', u: 'https://tempmailo.co/pt/'},
            {n: '10 Minute Mail', u: 'https://10minutemail.com/'}
        ])">E-mail Temporário</div>

        <div class="btn" onclick="openTool('Dorks & Infra', [
            {n: 'DorkSearch', u: 'https://dorksearch.pro'},
            {n: 'Shodan.io', u: 'https://www.shodan.io'},
            {n: 'OSINT.rocks', u: 'https://osint.rocks'},
            {n: 'Censys Search', u: 'https://search.censys.io/'},
            {n: 'ZoomEye', u: 'https://www.zoomeye.org/'}
        ])">Dorks & Infraestrutura</div>

        <div class="btn" onclick="openTool('Análise de Malware', [
            {n: 'VirusTotal', u: 'https://www.virustotal.com/'},
            {n: 'Hybrid Analysis', u: 'https://www.hybrid-analysis.com/'},
            {n: 'Any.Run', u: 'https://any.run/'}
        ])">Análise de Malware</div>

        <div class="btn" onclick="openTool('Inteligência OSINT', [
            {n: 'HaveIBeenPwned', u: 'https://haveibeenpwned.com/'},
            {n: 'IntelX', u: 'https://intelx.io/'},
            {n: 'OSINT Framework', u: 'https://osintframework.com/'}
        ])">Vazamentos & OSINT</div>

        <a href="hacks.html" class="btn-back">← Voltar ao menu</a>
    </div>

    <div id="overlay" onclick="closeTool()"></div>
    <div id="tool-popup">
        <div id="popup-title">Selecionar Link</div>
        <div id="popup-links-container"></div>
        <span class="close-btn" onclick="closeTool()">[ Desconectar ]</span>
    </div>

    <script>
        function openTool(title, links) {
            const container = document.getElementById('popup-links-container');
            document.getElementById('popup-title').innerText = title;
            container.innerHTML = ''; 

            links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.u;
                a.target = '_blank';
                a.className = 'popup-link';
                a.innerText = '>> ' + link.n;
                container.appendChild(a);
            });

            document.getElementById('tool-popup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeTool() {
            document.getElementById('tool-popup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
