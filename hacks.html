<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Hacks</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px; 
            margin: 0; 
            min-height: 100vh;
        }
        
        /* Container da foto com brilho vermelho intenso */
        .photo-container { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: 2px solid #ff0000; 
            overflow: hidden; 
            margin-bottom: 20px; 
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); 
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { 
            font-size: 26px; 
            color: #ff0000; 
            margin: 0; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7); 
            font-weight: 300;
        }
        
        .bio { 
            color: #fff; 
            font-family: monospace; 
            font-size: 14px; 
            margin: 15px 0 30px 0; 
            background: rgba(255, 0, 0, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }
        #glitch { color: #ff0000; font-weight: bold; }
        
        .button-container { width: 100%; max-width: 350px; }
        
        /* Botões Estilo Dark Red */
        .btn { 
            background-color: #0d0d0d; 
            border: 1px solid #300; 
            color: #eee; 
            text-decoration: none; 
            display: block; 
            padding: 18px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            text-align: center; 
            font-weight: bold; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 13px;
        }
        
        .btn:hover { 
            border-color: #ff0000; 
            background-color: #ff0000; 
            color: #000;
            transform: translateY(-3px); 
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.4);
        }

        .btn-back { 
            color: #555; 
            text-decoration: none; 
            margin-top: 20px; 
            font-size: 13px; 
            font-family: monospace; 
            transition: 0.3s;
        }
        .btn-back:hover { color: #ff0000; letter-spacing: 2px; }

        /* Pop-up Modernizado */
        #overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(5px);
            z-index: 999; 
        }
        
        #custom-alert { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background-color: #050505; 
            border: 1px solid #ff0000; 
            padding: 30px; 
            z-index: 1000; 
            text-align: center; 
            border-radius: 20px; 
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.5); 
            width: 85%; 
            max-width: 300px; 
        }
        
        .popup-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            margin-bottom: 20px;
            object-fit: cover;
        }

        #custom-alert h2 { color: #ff0000; margin: 0 0 10px 0; font-size: 18px; letter-spacing: 2px; }
        #custom-alert p { font-family: monospace; color: #888; font-size: 12px; margin-bottom: 25px; line-height: 1.5; }
        #custom-alert button { 
            background: transparent; 
            border: 1px solid #ff0000; 
            color: #ff0000; 
            padding: 10px 30px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }
        #custom-alert button:hover { background: #ff0000; color: #000; }
    </style>
</head>
<body>

    <div id="overlay" onclick="fecharPopUp()"></div>
    <div id="custom-alert">
        <img src="https://64.media.tumblr.com/f380a22bf69fe739c0416842071884ce/f3416c2782181375-fd/s400x600/12d3933f586a206c0de01257a4568d836dbfb024.gifv" class="popup-photo">
        <h2>ACESSO NEGADO</h2>
        <p>> Erro: 0x8004005<br>> Código de segurança não aprovado!<br>> Firewall Ativo.</p>
        <button onclick="fecharPopUp()">SAIR</button>
    </div>

    <div class="photo-container">
        <img src="https://i.makeagif.com/media/10-02-2016/A4wmZs.gif" alt="Near Rem">
    </div>

    <h1>Hacks</h1>
    <div class="bio">SESSÃO: <span id="glitch"></span></div>

    <div class="button-container">
        <a href="https://discord.gg/kDJCpD8kch" target="_blank" class="btn">Servidor sem rastro</a>
        <a href="ferramentas.html" class="btn">🛠 Arsenal WEB</a>
        
        <a href="instalaveis.html" class="btn">💻 Sistemas Locais</a>
        
        <div class="btn" onclick="abrirPopUp()">❌ Sem autorização ❌</div>
        
        <a href="index.html" class="btn-back">← Voltar ao menu</a>
    </div>

    <script>
        function abrirPopUp() {
            document.getElementById('custom-alert').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function fecharPopUp() {
            document.getElementById('custom-alert').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        const chars = '0123456789ABCDEF';
        const glitchElement = document.getElementById('glitch');
        
        setInterval(() => {
            let result = '';
            for (let i = 0; i < 8; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            glitchElement.innerText = 'RED_AUTH_' + result;
        }, 1); 
    </script>
</body>
</html>
