<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ffffff;
            --dim: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.12);
            --glow: rgba(255,255,255,0.15);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow-x: hidden;
            touch-action: manipulation; /* Melhora resposta do toque no mobile */
        }

        /* ── Canvas de partículas ── */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; /* Jogado para trás de tudo */
            pointer-events: none;
        }

        /* ── Grid e Overlays ── */
        .grid-overlay, .scanlines, .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none; /* Crucial: não bloqueia cliques */
            z-index: 10; 
        }

        .grid-overlay {
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        .scanlines {
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
        }

        .vignette {
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
        }

        /* ── Wrapper 3D ── */
        #scene {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 40px;
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        .layer {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 6;
        }

        /* ── Foto ── */
        .photo-wrap {
            position: relative;
            margin-bottom: 28px;
            pointer-events: none; /* A foto não precisa de clique */
        }

        .photo-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            animation: ring-spin 8s linear infinite;
        }

        @keyframes ring-spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .photo-container {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.4);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* ── Nome ── */
        h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(18px, 5vw, 28px);
            color: #fff;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 24px;
            text-align: center;
        }

        /* ── Bio ── */
        .bio {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            line-height: 2;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 14px 24px;
            border-radius: 8px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 340px;
        }

        /* ── Botões (Hitbox Corrigida) ── */
        .button-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            z-index: 20; /* Garante que fiquem acima de overlays */
        }

        .btn {
            position: relative;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .btn:hover, .btn:active {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
            color: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .btn-arrow { opacity: 0.4; transition: 0.3s; }
        .btn:hover .btn-arrow { opacity: 1; transform: translateX(5px); }

        .footer-tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.15);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="grid-overlay"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div id="scene">
        <div class="layer" data-depth="0.1">
            <div class="photo-wrap">
                <div class="photo-ring"></div>
                <div class="photo-container">
                    <img src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/a2f7c9d8-a913-4273-847f-705be41395df/da61r89-10eafa98-1292-47fe-86f4-0690a95fc681.gif?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiIvZi9hMmY3YzlkOC1hOTEzLTQyNzMtODQ3Zi03MDViZTQxMzk1ZGYvZGE2MXI4OS0xMGVhZmE5OC01MjkxLTQ3ZmUtODZmNC0wNjkwYTk1ZmM2ODEuZ2lmIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.GpJnJyaxOTYBAQXaDWDSOyBth_nsIpV0OC6kYy6ioaQ" alt="Near">
                </div>
            </div>
        </div>

        <div class="layer" data-depth="0.05">
            <h1>Near Rem</h1>
        </div>

        <div class="layer" data-depth="0.02">
            <div class="bio">
                SESSÃO &nbsp;›&nbsp; <span id="glitch" style="color:#fff;"></span><br>
                IP &nbsp;›&nbsp; <span id="user-ip">RESOLVENDO...</span>
            </div>

            <div class="button-container">
                <a href="contatos.html" class="btn">
                    <span>Meus Contatos</span>
                    <span class="btn-arrow">›</span>
                </a>
                <a href="hacks.html" class="btn">
                    <span>Arsenal</span>
                    <span class="btn-arrow">›</span>
                </a>
                <a href="sobre.html" class="btn">
                    <span>Sobre Mim</span>
                    <span class="btn-arrow">›</span>
                </a>
                <a href="dados.html" class="btn">
                    <span>Beta</span>
                    <span class="btn-arrow">›</span>
                </a>
            </div>
        </div>

        <div class="footer-tag">> CORE_SYSTEM_V3</div>
    </div>

    <script>
    // Partículas (Simplificado para performance)
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function init() {
        particles = [];
        for(let i=0; i<60; i++) {
            particles.push({
                x: Math.random()*W, y: Math.random()*H,
                vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
                r: Math.random()*1.2
            });
        }
    }
    init();

    function draw() {
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
            p.x += p.vx; p.y += p.vy;
            if(p.x<0) p.x=W; if(p.x>W) p.x=0;
            if(p.y<0) p.y=H; if(p.y>H) p.y=0;
        });
        requestAnimationFrame(draw);
    }
    draw();

    // Parallax Suave (Hitbox Safe)
    const scene = document.getElementById('scene');
    const layers = document.querySelectorAll('.layer');
    let tX = 0, tY = 0, cX = 0, cY = 0;

    document.addEventListener('mousemove', e => {
        tX = (e.clientX - window.innerWidth/2) / (window.innerWidth/2);
        tY = (e.clientY - window.innerHeight/2) / (window.innerHeight/2);
    });

    // Giroscópio para Mobile
    window.addEventListener('deviceorientation', e => {
        if(e.gamma) {
            tX = e.gamma / 30;
            tY = (e.beta - 40) / 30;
        }
    });

    function loop() {
        cX += (tX - cX) * 0.08;
        cY += (tY - cY) * 0.08;
        
        // Rotaciona apenas a cena levemente
        scene.style.transform = `rotateY(${cX * 5}deg) rotateX(${-cY * 5}deg)`;
        
        layers.forEach(l => {
            const d = l.dataset.depth;
            // Move as camadas sem usar translateZ que quebra o clique
            l.style.transform = `translateX(${cX * d * 50}px) translateY(${cY * d * 50}px)`;
        });
        requestAnimationFrame(loop);
    }
    loop();

    // Glitch e IP
    setInterval(() => {
        document.getElementById('glitch').textContent = Math.random().toString(16).slice(2,10).toUpperCase();
    }, 100);

    async function getIP() {
        try {
            const r = await fetch('https://api.ipify.org?format=json');
            const d = await r.json();
            document.getElementById('user-ip').textContent = d.ip;
        } catch { document.getElementById('user-ip').textContent = 'ANONYMOUS'; }
    }
    getIP();
    </script>
</body>
</html>
