<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projetos</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05030f;
  --a:#7c5cfc;--a2:#9d80ff;--a3:#c0adff;
  --b:#00e5b0;--b2:#5cf4d0;
  --c:#ff4f8b;--c2:#ff85ad;
  --gold:#f5c842;
  --ink:#e8e2ff;--ink2:#7b72b8;--ink3:#2e2a50;
}
html,body{height:100%;background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--ink);overflow:hidden;cursor:none}

/* ── CURSOR ── */
#cur{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--a2);mix-blend-mode:screen;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .3s,height .3s,background .3s}
#cur2{position:fixed;width:36px;height:36px;border-radius:50%;border:1px solid rgba(157,128,255,.3);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .4s,height .4s,border-color .3s}

/* ── CANVAS ── */
#cosmos{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── VIGNETTE ── */
.vig{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 35%,rgba(5,3,15,.9) 100%)}

/* ── LAYOUT ── */
main{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;gap:0;
}

/* ── HEADER ── */
.header{text-align:center;margin-bottom:56px}
.logo{
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.55em;
  color:var(--ink2);text-transform:uppercase;margin-bottom:20px;
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--a);box-shadow:0 0 10px var(--a);animation:live 2s ease-in-out infinite}
@keyframes live{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:.5}}

.title{
  font-size:clamp(40px,7vw,88px);font-weight:700;letter-spacing:-.04em;line-height:.95;
  background:linear-gradient(135deg,#fff 0%,var(--a3) 45%,var(--b2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.title em{
  font-style:normal;
  background:linear-gradient(135deg,var(--a),var(--c) 60%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;
}
.title em::before,.title em::after{
  content:attr(data-t);position:absolute;top:0;left:0;
  background:inherit;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.title em::before{animation:ga 5s 1s infinite;clip-path:polygon(0 25%,100% 25%,100% 45%,0 45%);transform:translate(-2px);opacity:.7}
.title em::after{animation:gb 5s 1s infinite;clip-path:polygon(0 65%,100% 65%,100% 80%,0 80%);transform:translate(2px);opacity:.5}
@keyframes ga{0%,88%,100%{transform:translate(0)}90%{transform:translate(-3px,1px)}93%{transform:translate(2px,-1px)}}
@keyframes gb{0%,88%,100%{transform:translate(0)}91%{transform:translate(3px,-1px)}94%{transform:translate(-2px,1px)}}

/* ── PROJECTS GRID ── */
.grid{
  display:flex;flex-wrap:wrap;gap:14px;
  justify-content:center;align-items:center;
  max-width:900px;
}

/* ── PROJECT BUTTON ── */
.proj{
  position:relative;overflow:hidden;cursor:none;
  border-radius:16px;text-decoration:none;
  border:1px solid rgba(255,255,255,.07);
  background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
  padding:22px 32px;
  display:flex;align-items:center;gap:16px;
  transition:transform .4s cubic-bezier(.23,1,.32,1),box-shadow .4s,border-color .3s;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  animation:card-in .6s cubic-bezier(.23,1,.32,1) both;
}

.proj:nth-child(1){animation-delay:.05s}
.proj:nth-child(2){animation-delay:.12s}
.proj:nth-child(3){animation-delay:.19s}
.proj:nth-child(4){animation-delay:.26s}
.proj:nth-child(5){animation-delay:.33s}
@keyframes card-in{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.proj::before{
  content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);
  transform:skewX(-18deg);transition:left .55s;
}
.proj:hover::before{left:160%}

.proj-glow{
  position:absolute;inset:-30px;border-radius:50%;opacity:0;
  transition:opacity .4s;pointer-events:none;filter:blur(30px);
}
.proj:hover .proj-glow{opacity:.3}
.proj:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:rgba(255,255,255,.14);
}

.proj-icon{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;position:relative;
  border:1px solid rgba(255,255,255,.08);
}

.proj-name{
  font-size:16px;font-weight:600;letter-spacing:-.01em;
  color:var(--ink);white-space:nowrap;
}

.proj-dot{
  width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0;
  transition:box-shadow .3s;
}
.dot-off{background:#3a3560}
.dot-on{background:var(--b);box-shadow:0 0 8px var(--b);animation:live 2s infinite}

.proj.unavail .proj-name{color:var(--ink2)}
.proj.unavail{opacity:.7}
.proj.unavail:hover{opacity:1}

.proj-arr{
  font-size:14px;color:var(--ink2);
  transition:transform .3s,color .3s;margin-left:4px;
}
.proj:hover .proj-arr{transform:translateX(4px);color:var(--ink)}

.footer{
  margin-top:52px;
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.3em;
  color:var(--ink3);text-transform:uppercase;text-align:center;
}

@media(max-width:600px){
  main{overflow-y:auto;overflow-x:hidden;justify-content:flex-start;padding-top:80px}
  .header{margin-bottom:36px}
  .proj{width:100%;max-width:360px}
  html,body{overflow:hidden}
}
@media(max-height:640px){
  main{justify-content:flex-start;padding-top:60px;overflow-y:auto}
  html,body{overflow:hidden}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur2"></div>
<canvas id="cosmos"></canvas>
<div class="vig"></div>

<main>
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      São apenas alguns passa tempo
    </div>
    <div class="title">Escolha um <em data-t="projeto.">projeto.</em></div>
  </div>

  <div class="grid" id="grid">

    <a href="chat.html" class="proj" data-glow="124,92,252">
      <div class="proj-glow" style="background:radial-gradient(circle,rgba(124,92,252,1),transparent)"></div>
      <div class="proj-icon" style="background:rgba(124,92,252,.15);border-color:rgba(124,92,252,.25)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(157,128,255,.9)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
      </div>
      <span class="proj-name">Telepatia(p2p)</span>
      <div class="proj-dot dot-off"></div>
      <span class="proj-arr">→</span>
    </a>

    <a href="#" class="proj unavail" data-glow="0,229,176" onclick="return false">
      <div class="proj-glow" style="background:radial-gradient(circle,rgba(0,229,176,1),transparent)"></div>
      <div class="proj-icon" style="background:rgba(0,229,176,.08);border-color:rgba(0,229,176,.15)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(0,229,176,.5)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <path d="M9 9h6M9 12h6M9 15h4"/>
        </svg>
      </div>
      <span class="proj-name">Em breve</span>
      <div class="proj-dot dot-off"></div>
      <span class="proj-arr" style="opacity:.3">—</span>
    </a>

    <a href="#" class="proj unavail" data-glow="255,79,139" onclick="return false">
      <div class="proj-glow" style="background:radial-gradient(circle,rgba(255,79,139,1),transparent)"></div>
      <div class="proj-icon" style="background:rgba(255,79,139,.08);border-color:rgba(255,79,139,.15)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,120,170,.5)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <span class="proj-name">Em breve</span>
      <div class="proj-dot dot-off"></div>
      <span class="proj-arr" style="opacity:.3">—</span>
    </a>

    <a href="#" class="proj unavail" data-glow="245,200,66" onclick="return false">
      <div class="proj-glow" style="background:radial-gradient(circle,rgba(245,200,66,1),transparent)"></div>
      <div class="proj-icon" style="background:rgba(245,200,66,.08);border-color:rgba(245,200,66,.15)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(245,200,66,.5)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <span class="proj-name">Em breve</span>
      <div class="proj-dot dot-off"></div>
      <span class="proj-arr" style="opacity:.3">—</span>
    </a>

    <a href="#" class="proj unavail" data-glow="92,244,208" onclick="return false">
      <div class="proj-glow" style="background:radial-gradient(circle,rgba(92,244,208,1),transparent)"></div>
      <div class="proj-icon" style="background:rgba(92,244,208,.08);border-color:rgba(92,244,208,.15)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(92,244,208,.5)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <span class="proj-name">Em breve</span>
      <div class="proj-dot dot-off"></div>
      <span class="proj-arr" style="opacity:.3">—</span>
    </a>

  </div>

  <div class="footer">✦ &nbsp; todos os direitos reservados a @near_rem</div>
</main>

<script>
/* ══ COSMOS ══ */
(function(){
  const c = document.getElementById('cosmos');
  const ctx = c.getContext('2d');
  let W, H;
  const mouse = {x:-999,y:-999};
  const COLS = [[124,92,252],[0,229,176],[255,79,139],[157,128,255],[245,200,66]];

  const resize = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

  class Star {
    constructor(){this.reset();this.y=Math.random()*H}
    reset(){
      this.x=Math.random()*W; this.y=H+5;
      this.r=.3+Math.random()*1.3;
      this.vy=.06+Math.random()*.15;
      this.vx=(Math.random()-.5)*.05;
      this.col=COLS[Math.floor(Math.random()*COLS.length)];
      this.a=.1+Math.random()*.55;
      this.phase=Math.random()*Math.PI*2;
      this.ps=.004+Math.random()*.012;
    }
    tick(){
      this.y-=this.vy; this.x+=this.vx;
      this.phase+=this.ps;
      const dx=this.x-mouse.x,dy=this.y-mouse.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<130){const f=(130-d)/130;this.x+=dx/d*f*1.5;this.y+=dy/d*f*1.5}
      if(this.y<-5||this.x<-5||this.x>W+5)this.reset();
    }
    draw(){
      const a=this.a*(.55+.45*Math.sin(this.phase));
      const [r,g,b]=this.col;
      const grd=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*5);
      grd.addColorStop(0,`rgba(${r},${g},${b},${a*.9})`);
      grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
      ctx.beginPath();ctx.arc(this.x,this.y,this.r*5,0,Math.PI*2);
      ctx.fillStyle=grd;ctx.fill();
      ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${Math.min(a*1.5,1)})`;ctx.fill();
    }
  }

  class Flow {
    constructor(){this.reset();this.x=Math.random()*W;this.y=Math.random()*H}
    reset(){
      this.x=Math.random()*W; this.y=Math.random()*H;
      this.vx=0;this.vy=0;this.life=0;
      this.maxLife=120+Math.random()*180;
      this.col=COLS[Math.floor(Math.random()*COLS.length)];
      this.speed=.6+Math.random()*1.2;
    }
    tick(t){
      this.life++;
      if(this.life>this.maxLife){this.reset();return}
      const ang=Math.sin(this.x*.005+t*.00025)*Math.cos(this.y*.005+t*.0002)*Math.PI*4;
      this.vx+=Math.cos(ang)*.25; this.vy+=Math.sin(ang)*.25;
      const dx=mouse.x-this.x,dy=mouse.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<180&&d>0){this.vx+=dx/d*.12;this.vy+=dy/d*.12}
      this.vx*=.91;this.vy*=.91;
      this.x+=this.vx*this.speed; this.y+=this.vy*this.speed;
      if(this.x<0)this.x=W; if(this.x>W)this.x=0;
      if(this.y<0)this.y=H; if(this.y>H)this.y=0;
    }
    draw(t){
      const [r,g,b]=this.col;
      const a=Math.sin(this.life/this.maxLife*Math.PI)*.28;
      ctx.beginPath();ctx.arc(this.x,this.y,.9,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${a})`;ctx.fill();
    }
  }

  class Neb {
    constructor(){this.reset();this.y=Math.random()*H;this.op=Math.random()*.04}
    reset(){
      this.x=Math.random()*W;this.y=H+200;
      this.rx=150+Math.random()*200;this.ry=80+Math.random()*120;
      this.col=COLS[Math.floor(Math.random()*COLS.length)];
      this.vy=.03+Math.random()*.06;this.op=.02+Math.random()*.04;
    }
    tick(){this.y-=this.vy;if(this.y+this.ry<0)this.reset()}
    draw(){
      const [r,g,b]=this.col;
      const grd=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.rx);
      grd.addColorStop(0,`rgba(${r},${g},${b},${this.op})`);
      grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
      ctx.beginPath();ctx.ellipse(this.x,this.y,this.rx,this.ry,0,0,Math.PI*2);
      ctx.fillStyle=grd;ctx.fill();
    }
  }

  const stars=[]; for(let i=0;i<160;i++)stars.push(new Star());
  const flows=[]; for(let i=0;i<100;i++)flows.push(new Flow());
  const nebs=[]; for(let i=0;i<7;i++)nebs.push(new Neb());

  function drawLines(){
    for(let i=0;i<stars.length;i++){
      for(let j=i+1;j<stars.length;j++){
        const dx=stars[i].x-stars[j].x,dy=stars[i].y-stars[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){
          const [r,g,b]=stars[i].col;
          ctx.beginPath();ctx.moveTo(stars[i].x,stars[i].y);ctx.lineTo(stars[j].x,stars[j].y);
          ctx.strokeStyle=`rgba(${r},${g},${b},${(1-d/90)*.055})`;ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
  }

  function frame(t){
    ctx.clearRect(0,0,W,H);
    nebs.forEach(n=>{n.tick();n.draw()});
    flows.forEach(f=>{f.tick(t);f.draw(t)});
    drawLines();
    stars.forEach(s=>{s.tick();s.draw()});
    if(mouse.x>0){
      const grd=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,180);
      grd.addColorStop(0,'rgba(124,92,252,0.04)');grd.addColorStop(1,'rgba(124,92,252,0)');
      ctx.fillStyle=grd;ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

/* ══ CURSOR ══ */
(function(){
  const cur=document.getElementById('cur');
  const cur2=document.getElementById('cur2');
  let mx=-100,my=-100,cx=-100,cy=-100;
  window.addEventListener('mousemove',e=>{
    mx=e.clientX;my=e.clientY;
    cur.style.left=mx+'px';cur.style.top=my+'px';
  });
  function lerp(a,b,t){return a+(b-a)*t}
  function tick(){
    cx=lerp(cx,mx,.12);cy=lerp(cy,my,.12);
    cur2.style.left=cx+'px';cur2.style.top=cy+'px';
    requestAnimationFrame(tick);
  }
  tick();
  document.querySelectorAll('.proj').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      cur.style.width='7px';cur.style.height='7px';
      cur2.style.width='54px';cur2.style.height='54px';
      cur2.style.borderColor='rgba(157,128,255,.55)';
    });
    el.addEventListener('mouseleave',()=>{
      cur.style.width='10px';cur.style.height='10px';
      cur2.style.width='36px';cur2.style.height='36px';
      cur2.style.borderColor='rgba(157,128,255,.3)';
    });
  });
})();

/* ══ CARD TILT ══ */
document.querySelectorAll('.proj').forEach(card=>{
  card.addEventListener('mousemove',e=>{
    const rect=card.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const rx=(e.clientY-cy)/(rect.height/2);
    const ry=-(e.clientX-cx)/(rect.width/2);
    card.style.transform=`translateY(-6px) rotateX(${rx*7}deg) rotateY(${ry*7}deg) scale(1.02)`;
  });
  card.addEventListener('mouseleave',()=>{card.style.transform=''});
});

/* ══ TITLE PARALLAX ══ */
document.addEventListener('mousemove',e=>{
  const x=(e.clientX/innerWidth-.5)*14;
  const y=(e.clientY/innerHeight-.5)*8;
  const t=document.querySelector('.title');
  if(t)t.style.transform=`rotateY(${x*.25}deg) rotateX(${-y*.25}deg)`;
});
</script>
</body>
</html>
