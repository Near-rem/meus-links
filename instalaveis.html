<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near Rem - Sistemas Locais</title>
    <style>
        body { 
            background-color: #000; /* Fundo Preto Puro Clássico */
            color: #fff; /* Texto Branco Clássico */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 50px 20px; margin: 0; min-height: 100vh;
        }

        /* Foto com borda Roxo Neon */
        .photo-container { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 2px solid #8a2be2; /* Roxo Neon */
            overflow: hidden; 
            margin-bottom: 20px; 
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5); 
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 22px; color: #fff; margin: 0; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; }
        .subtitle { color: #8a2be2; font-family: monospace; font-size: 13px; margin: 10px 0 40px 0; letter-spacing: 1px; }

        .button-container { width: 100%; max-width: 350px; }

        /* Botões Estilo Minimalista Escuro Clássico */
        .btn { 
            background-color: #0d0d0d; 
            border: 1px solid #222; 
            color: #ccc; 
            text-decoration: none; 
            display: block; 
            padding: 16px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            text-align: center; 
            font-weight: 500; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 11px;
        }
        
        /* Hover com destaque Roxo Neon */
        .btn:hover { 
            border-color: #8a2be2; 
            color: #fff;
            background-color: #1a0033; /* Fundo Roxo bem escuro no hover */
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.2);
        }

        .btn-full { color: #444; text-decoration: none; margin-top: 30px; font-size: 13px; transition: 0.3s; text-align: center; display: block;}
        .btn-full:hover { color: #8a2be2; }

        /* Pop-up Modernizado (Glassmorphism Roxo) */
        #overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(8px);
            z-index: 999; 
            animation: fadeIn 0.3s ease;
        }

        #tool-popup { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(10, 0, 15, 0.95); /* Fundo quase preto com toque roxo */
            border: 1px solid rgba(138, 43, 226, 0.5); 
            padding: 30px; 
            z-index: 1000; 
            text-align: center; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 20px rgba(138, 43, 226, 0.2); 
            width: 85%; max-width: 320px; 
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #popup-title { 
            color: #fff; 
            font-size: 16px; 
            margin-bottom: 25px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }
        
        .popup-link {
            display: block; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 14px; 
            margin-bottom: 12px; 
            text-decoration: none; 
            border-radius: 10px;
            font-size: 14px; 
            transition: 0.3s;
            font-family: 'Courier New', monospace;
        }
        .popup-link:hover { 
            background: #8a2be2; /* Roxo Neon no hover do link */
            border-color: #fff; 
            color: #000; 
            font-weight: bold;
        }
        
        .close-btn { 
            margin-top: 20px; 
            color: #555; 
            font-size: 11px; 
            cursor: pointer; 
            display: inline-block; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .close-btn:hover { color: #8a2be2; }

        /* Animações */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, -40%); } to { opacity: 1; transform: translate(-50%, -50%); } }

    </style>
</head>
<body>

    <div class="photo-container">
        <img src="https://64.media.tumblr.com/7a1a7ea33336dd28f1a0499be9534afb/f3416c2782181375-af/s250x400/95007b9ca7746a231306ff4cfed6c088df67d664.gifv">
    </div>

    <h1>Sistemas Locais</h1>
    <div class="subtitle">LOCAL_STATION_ENV</div>

    <div class="button-container">
        
        <div class="btn" onclick="openTool('Redes & Sniffing', [
            {n: 'Nmap (Scanner)', u: 'https://nmap.org/download.html'},
            {n: 'Wireshark (Sniffer)', u: 'https://www.wireshark.org/'},
            {n: 'Bettercap', u: 'https://www.bettercap.org/'},
            {n: 'Ettercap', u: 'https://www.ettercap-project.org/'}
        ])">Redes & Sniffing</div>

        <div class="btn" onclick="openTool('Pentest Web', [
            {n: 'Burp Suite', u: 'https://portswigger.net/burp/communitydownload'},
            {n: 'OWASP ZAP', u: 'https://www.zaproxy.org/'},
            {n: 'Nikto', u: 'https://github.com/sullo/nikto'},
            {n: 'Sqlmap', u: 'https://sqlmap.org/'}
        ])">Pentest Web</div>

        <div class="btn" onclick="openTool('Análise & OSINT', [
            {n: 'Maltego (Soft)', u: 'https://www.maltego.com/downloads/'},
            {n: 'SpiderFoot CLI', u: 'https://github.com/smicallef/spiderfoot'},
            {n: 'Sherlock (User)', u: 'https://github.com/sherlock-project/sherlock'},
            {n: 'Autopsy (Forense)', u: 'https://www.autopsy.com/'}
        ])">Forense & OSINT</div>

        <div class="btn" onclick="openTool('Quebra de Senha', [
            {n: 'John the Ripper', u: 'https://www.openwall.com/john/'},
            {n: 'Hashcat', u: 'https://hashcat.net/hashcat/'},
            {n: 'Hydra', u: 'https://github.com/vanhauser-thc/thc-hydra'}
        ])">Bruteforce</div>

        <div class="btn" onclick="openTool('Anonimato Local', [
            {n: 'Tor Browser', u: 'https://www.torproject.org/'},
            {n: 'ProxyChains', u: 'https://github.com/rofl0r/proxychains-ng'},
            {n: 'Whonix OS', u: 'https://www.whonix.org/'}
        ])">Anonimato</div>

        <div class="btn" onclick="openTool('Exploração', [
            {n: 'Metasploit', u: 'https://www.metasploit.com/'},
            {n: 'BeEF Framework', u: 'https://beefproject.com/'},
            {n: 'Aircrack-ng', u: 'https://www.aircrack-ng.org/'}
        ])">Exploração</div>

        <a href="hacks.html" class="btn-full">← Voltar ao Terminal</a>
    </div>

    <div id="overlay" onclick="closeTool()"></div>
    <div id="tool-popup">
        <div id="popup-title">Selecionar Link</div>
        <div id="popup-links-container"></div>
        <div class="close-btn" onclick="closeTool()">[ Desconectar ]</div>
    </div>

    <script>
        function openTool(title, links) {
            const container = document.getElementById('popup-links-container');
            document.getElementById('popup-title').innerText = title;
            container.innerHTML = ''; 
            links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.u; a.target = '_blank'; a.className = 'popup-link';
                a.innerText = '>> ' + link.n;
                container.appendChild(a);
            });
            document.getElementById('tool-popup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeTool() {
            document.getElementById('tool-popup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
